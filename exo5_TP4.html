<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercice 5 - Sélecteurs d'attributs</title>
  <style>
    a[href] {
      color: #2980b9;
    }

    a[href^="https"] {
      font-weight: bold;
    }

    a[href^="mailto"] {
      color: red;
      font-style: italic;
    }

    a:hover {
      color: #e74c3c;
    }

    a:visited {
      color: purple;
    }

  </style>
</head>
<body>

  <h1>Exercice 5 — Liens et des 'input'</h1>

  <h2>Liens</h2>
  <ul>
    <li><a href="https://www.google.com">Google (https)</a></li>
    <li><a href="https://www.wikipedia.org">Wikipedia (https)</a></li>
    <li><a href="mailto:contact@example.com">Envoyer un email (mailto)</a></li>
    <li><a href="#section1">Aller à la section 1 (lien interne)</a></li>
  </ul>

  <h2 id="section1">Formulaire</h2>
  <input type="text" placeholder="Votre nom">
  <input type="email" placeholder="Votre email">
  <input type="submit" value="Envoyer">

</body>
</html>
