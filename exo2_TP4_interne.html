<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercice 2  Style en en-tête</title>
  <style>
    h1 {
      color: blue;
      text-align: center;
    }

    p {
      font-size: 1.2em;
      color: #CC0604;
    }

    li {
      color: red;
    }
  </style>
</head>
<body>

  <h1>Mon Titre Principal</h1>

  <p>
    Ceci est un paragraphe avec une taille de police de 1.2em et une couleur rouge foncé (#CC0604).
    Le style est appliqué via une balise style  dans le  head.
  </p>

  <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ul>

</body>
</html>
